<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Redes de Proteção</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

header {
  background: #0d1b2a;
  color: white;
  text-align: center;
  padding: 15px;
}

.hero {
  background: url('foto1.jpg') center/cover no-repeat;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

section {
  padding: 30px;
  text-align: center;
}

img {
  max-width: 100%;
  border-radius: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.stars {
  color: gold;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  margin: 10px;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

.whatsapp { background: green; }
.instagram { background: purple; }

footer {
  background: #0d1b2a;
  color: white;
  padding: 10px;
}
</style>

</head>

<body>

<header>
  <h1>Sport Redes de Proteção</h1>
</header>

<div class="hero">
  <h2>Segurança para Crianças e Pets</h2>
</div>

<section>
  <h2>Serviços</h2>
  <div class="grid">
    <div class="card">Janelas</div>
    <div class="card">Sacadas</div>
    <div class="card">Pets</div>
    <div class="card">Quadras</div>
  </div>
</section>

<section>
  <h2>Trabalhos</h2>
  <div class="grid">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
  </div>
</section>

<section>
  <h2>Avaliações</h2>

  <div class="grid">
    <div class="card">
      <div class="stars">★★★★★</div>
      <p>Serviço excelente!</p>
    </div>

    <div class="card">
      <div class="stars">★★★★★</div>
      <p>Muito profissional!</p>
    </div>

    <div class="card">
      <div class="stars">★★★★★</div>
      <p>Recomendo demais!</p>
    </div>
  </div>

</section>

<section>
  <h2>Contato</h2>

  <a class="btn whatsapp" href="https://wa.me/5511961628397">WhatsApp</a>
  <a class="btn instagram" href="https://instagram.com/sportredes_">Instagram</a>

</section>

<footer>
  <p>© Sport Redes de Proteção</p>
</footer>

</body>
</html>
